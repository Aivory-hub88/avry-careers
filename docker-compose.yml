version: '3.8'

services:
  avry-careers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avry-careers
    ports:
      - "8089:8089"
    environment:
      - PORT=8089
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-careers@aivory.id}
    volumes:
      - careers_cv_data:/app/data/cvs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aivory-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.avry-careers.rule=Host(`backend.aivory.id`) && PathPrefix(`/careers`)"
      - "traefik.http.routers.avry-careers.entrypoints=websecure"
      - "traefik.http.routers.avry-careers.tls.certresolver=letsencrypt"
      - "traefik.http.services.avry-careers.loadbalancer.server.port=8089"

volumes:
  careers_cv_data:

networks:
  aivory-network:
    name: aivory-network
    external: true
